name: format-remediation

on:
  push:
    branches:
      - chore/format-main

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: chore/format-main
          token: ${{ github.token }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Ruff
        run: python -m pip install --quiet ruff
      - name: Format and fix imports
        run: |
          ruff check vnalpha --fix --unsafe-fixes || true
          ruff format vnalpha
      - name: Commit formatting changes
        run: |
          if git diff --quiet; then
            echo "No formatting changes required."
            exit 0
          fi
          git config user.name "openstock-ci"
          git config user.email "openstock-ci@users.noreply.github.com"
          git add vnalpha
          git commit -m "chore: format remediation changes"
          git push origin HEAD:chore/format-main

name: vnalpha-ci

on:
  pull_request:
    paths:
      - "vnalpha/**"
      - "openspec/**"
      - "packaging/**"
      - "Makefile"
      - ".github/workflows/vnalpha-ci.yml"
  push:
    branches:
      - main
    paths:
      - "vnalpha/**"
      - "openspec/**"
      - "packaging/**"
      - "Makefile"
      - ".github/workflows/vnalpha-ci.yml"

concurrency:
  group: vnalpha-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Repository hygiene and secret scan
        run: |
          make repo-hygiene
          packaging/scripts/openstock-secret-scan
          bash packaging/tests/test_repo_hygiene.sh
          bash packaging/tests/test_repo_secret_scan.sh

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: vnalpha/pyproject.toml

      - name: Install vnalpha and development dependencies
        run: |
          python -m pip install --quiet --disable-pip-version-check --upgrade pip
          python -m pip install --quiet --disable-pip-version-check -e "./vnalpha[dev]"

      - name: Focused assistant research-intelligence tests
        id: focused-tests
        shell: bash
        run: |
          set -o pipefail
          cd vnalpha
          pytest -q --tb=short \
            tests/test_assistant_research_intelligence_completion.py \
            tests/test_research_answer_audit_completion.py \
            tests/test_research_intent_classification_matrix.py \
            tests/test_research_policy_rewrite_completion.py \
            tests/test_research_tool_execution_completion.py \
            2>&1 | tee ../focused-tests.log

      - name: Upload focused-test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: focused-tests-log
          path: focused-tests.log
          if-no-files-found: error
          retention-days: 7

      - name: Lint and format check
        shell: bash
        run: |
          set -o pipefail
          make lint-vnalpha 2>&1 | tee lint.log

      - name: Upload lint diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-log
          path: lint.log
          if-no-files-found: warn
          retention-days: 7

      - name: Full vnalpha test suite
        run: make test-vnalpha

      - name: R4 acceptance tests
        run: make verify-r4

      - name: OpenStock verification
        shell: bash
        run: |
          set -o pipefail
          packaging/scripts/openstock-verify --ci 2>&1 | tee packaging-verify.log

      - name: Upload packaging diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: packaging-verify-log
          path: packaging-verify.log
          if-no-files-found: warn
          retention-days: 7

      - name: Fixture-contract evaluation
        shell: bash
        run: |
          set -o pipefail
          make eval-research-answers 2>&1 | tee eval-research-answers.log

      - name: Upload fixture-evaluation diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-research-answers-log
          path: eval-research-answers.log
          if-no-files-found: error
          retention-days: 7

      - name: Runtime-replay evaluation
        shell: bash
        run: |
          set -o pipefail
          make eval-research-runtime 2>&1 | tee eval-research-runtime.log

      - name: Upload runtime-evaluation diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-research-runtime-log
          path: eval-research-runtime.log
          if-no-files-found: error
          retention-days: 7

      - name: Installed wheel and sdist evaluations
        shell: bash
        run: |
          set -euo pipefail
          rm -rf /tmp/vnalpha-package-check
          mkdir -p /tmp/vnalpha-package-check/wheel /tmp/vnalpha-package-check/sdist
          python -m pip wheel --quiet --no-deps --no-build-isolation \
            --wheel-dir /tmp/vnalpha-package-check/wheel ./vnalpha
          python -m build --quiet --sdist --no-isolation \
            --outdir /tmp/vnalpha-package-check/sdist ./vnalpha
          for artifact in \
            /tmp/vnalpha-package-check/wheel/*.whl \
            /tmp/vnalpha-package-check/sdist/*.tar.gz; do
            install_root="/tmp/vnalpha-package-check/installed-$(basename "${artifact}")"
            python -m pip install --quiet --no-deps --target "${install_root}" "${artifact}"
            (
              cd /tmp
              PYTHONPATH="${install_root}" python -c 'from vnalpha.cli import app; app()' eval research-answers --ci
              PYTHONPATH="${install_root}" python -c 'from vnalpha.cli import app; app()' eval research-runtime --ci
            )
          done 2>&1 | tee installed-package-evals.log

      - name: Upload installed-package diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: installed-package-evals-log
          path: installed-package-evals.log
          if-no-files-found: warn
          retention-days: 7

      - name: OpenSpec verifier tests
        run: python -m pytest -q scripts/tests/test_check_openspec_completion.py

      - name: OpenSpec completion verifier
        run: python scripts/check-openspec-completion.py openspec/changes/openstock-four-phase-hardening

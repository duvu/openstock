name: format-pr302

on:
  push:
    branches:
      - agent/fix-per-dataset-maintenance-routing

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-per-dataset-maintenance-routing
          token: ${{ github.token }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Ruff
        run: python -m pip install --quiet ruff
      - name: Fix imports and formatting
        run: |
          ruff check vnalpha --fix --unsafe-fixes || true
          ruff format vnalpha
      - name: Commit fixes
        run: |
          if git diff --quiet; then
            echo "No formatting changes required."
            exit 0
          fi
          git config user.name "openstock-ci"
          git config user.email "openstock-ci@users.noreply.github.com"
          git add vnalpha
          git commit -m "chore: restore vnalpha Ruff compliance"
          git push origin HEAD:agent/fix-per-dataset-maintenance-routing

name: one-shot-ruff-remediation

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/one-shot-ruff-remediation.yml"

permissions:
  contents: write
  pull-requests: write

jobs:
  remediate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ github.token }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Format exact main source
        run: |
          python -m pip install --quiet ruff
          ruff check vnalpha --fix --unsafe-fixes || true
          ruff format vnalpha
      - name: Push remediation branch and open PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if git diff --quiet; then
            echo "No Ruff changes required."
            exit 0
          fi
          branch="bot/ruff-remediation-${GITHUB_SHA::8}"
          git config user.name "openstock-ci"
          git config user.email "openstock-ci@users.noreply.github.com"
          git switch -c "$branch"
          git add vnalpha
          git commit -m "chore: restore vnalpha Ruff compliance"
          git push origin "$branch"
          gh pr create \
            --base main \
            --head "$branch" \
            --title "chore: restore vnalpha Ruff compliance" \
            --body "Automated exact-main Ruff import fixes and formatting after remediation PRs #294-#298. No intended behavior changes."

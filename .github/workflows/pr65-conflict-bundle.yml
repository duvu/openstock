name: PR65 conflict bundle

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Fetch merge inputs
        run: |
          git fetch origin main feat/research-workflow-handlers --no-tags

      - name: Create git bundle
        run: |
          git bundle create openstock-pr65.bundle \
            HEAD \
            refs/remotes/origin/main \
            refs/remotes/origin/feat/research-workflow-handlers
          git bundle verify openstock-pr65.bundle

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: openstock-pr65-conflict-bundle
          path: openstock-pr65.bundle
          if-no-files-found: error
          retention-days: 1

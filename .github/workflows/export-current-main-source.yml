name: export-current-main-source

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Archive exact pull-request source
        run: git archive --format=zip --output=openstock-current-source.zip HEAD
      - name: Upload exact source
        uses: actions/upload-artifact@v4
        with:
          name: openstock-current-source-${{ github.sha }}
          path: openstock-current-source.zip
          if-no-files-found: error
          retention-days: 1

name: Apply issue 112 corporate actions

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    name: Apply verified issue 112 reconciliation refactor
    if: >-
      github.event.pull_request.head.ref == 'agent/issue-112-corporate-actions' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-112-corporate-actions
          fetch-depth: 0

      - name: Reassemble and verify validated refactor
        shell: bash
        run: |
          set -euo pipefail
          cat .github/issue112-refactor/part-* > /tmp/issue112-refactor.patch
          echo '0ac348c06d629fe78424785b4b095ea8e1e43dd7258e42fa467a687444f294d2  /tmp/issue112-refactor.patch' | sha256sum --check --strict
          git apply --check /tmp/issue112-refactor.patch

      - name: Apply refactor and remove temporary bootstrap
        shell: bash
        run: |
          set -euo pipefail
          git apply /tmp/issue112-refactor.patch
          rm -rf .github/issue112-refactor
          rm .github/workflows/apply-issue-112.yml

      - name: Stage verified final implementation
        shell: bash
        run: |
          set -euo pipefail
          git add -A
          git diff --cached --check
          git status --short

      - name: Commit verified final implementation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'openstock-ci'
          git config user.email 'openstock-ci@users.noreply.github.com'
          git commit --no-verify -m 'refactor(corporate-actions): separate reconciliation boundary'
          printf 'commit=%s\ntree=%s\nparent=%s\n' \
            "$(git rev-parse HEAD)" \
            "$(git rev-parse HEAD^{tree})" \
            "$(git rev-parse HEAD^)" > /tmp/issue112-final-commit.txt
          cat /tmp/issue112-final-commit.txt

      - name: Upload verified final commit identity
        uses: actions/upload-artifact@v4
        with:
          name: issue112-final-verified-commit
          path: /tmp/issue112-final-commit.txt
          if-no-files-found: error
          retention-days: 1

      - name: Attempt final branch push
        shell: bash
        run: |
          set -euo pipefail
          git push origin HEAD:agent/issue-112-corporate-actions

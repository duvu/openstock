name: Apply issue 112 corporate actions

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    name: Apply verified issue 112 source
    if: >-
      github.event.pull_request.head.ref == 'agent/issue-112-corporate-actions' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-112-corporate-actions
          fetch-depth: 0

      - name: Reassemble and verify reviewable patch
        shell: bash
        run: |
          set -euo pipefail
          : > /tmp/issue112.patch
          cat .github/issue112/patch-00 >> /tmp/issue112.patch
          cat .github/issue112/patch-01 >> /tmp/issue112.patch
          cat .github/issue112/patch-02 >> /tmp/issue112.patch
          awk 'NR < 106 { print; next } { sub(/^\+/, ""); print }' .github/issue112/patch-03 >> /tmp/issue112.patch
          awk 'NR < 279 { print; next } { sub(/^\+/, ""); print }' .github/issue112/patch-04 >> /tmp/issue112.patch
          awk 'NR < 12 { print; next } { sub(/^\+/, ""); print }' .github/issue112/patch-05 >> /tmp/issue112.patch
          awk 'NR < 343 { print; next } { sub(/^\+/, ""); print }' .github/issue112/patch-06 >> /tmp/issue112.patch
          awk 'NR < 2 { print; next } { sub(/^\+/, ""); print }' .github/issue112/patch-07 >> /tmp/issue112.patch
          echo 'e230fe58319caebd3f353500bc325d21a2b7b8383661425d7bdcaa8427fa5efe  /tmp/issue112.patch' | sha256sum --check --strict
          git apply --check /tmp/issue112.patch

      - name: Apply source and remove temporary bootstrap
        shell: bash
        run: |
          set -euo pipefail
          git apply /tmp/issue112.patch
          rm -rf .github/issue112
          rm .github/workflows/apply-issue-112.yml

      - name: Stage verified implementation
        shell: bash
        run: |
          set -euo pipefail
          git add -A
          git diff --cached --check
          git status --short

      - name: Commit verified implementation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'openstock-ci'
          git config user.email 'openstock-ci@users.noreply.github.com'
          git commit --no-verify -m 'feat(corporate-actions): add canonical ingestion contracts'

      - name: Push implementation branch
        shell: bash
        run: |
          set -euo pipefail
          git push origin HEAD:agent/issue-112-corporate-actions

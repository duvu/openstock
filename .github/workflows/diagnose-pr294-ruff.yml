name: diagnose-pr294-ruff

on:
  push:
    branches:
      - agent/fix-p0-ops

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --quiet ruff
      - name: software identity
        run: ruff check vnalpha/src/vnalpha/maintenance/software_identity.py && ruff format --check vnalpha/src/vnalpha/maintenance/software_identity.py
      - name: ledger schema
        run: ruff check vnalpha/src/vnalpha/warehouse/maintenance_ledger_schema.py && ruff format --check vnalpha/src/vnalpha/warehouse/maintenance_ledger_schema.py
      - name: ledger
        run: ruff check vnalpha/src/vnalpha/maintenance/ledger.py && ruff format --check vnalpha/src/vnalpha/maintenance/ledger.py
      - name: maintain cli
        run: ruff check vnalpha/src/vnalpha/cli_app/maintain.py && ruff format --check vnalpha/src/vnalpha/cli_app/maintain.py
      - name: source policy
        run: ruff check vnalpha/src/vnalpha/data_provisioning/source_policy.py && ruff format --check vnalpha/src/vnalpha/data_provisioning/source_policy.py
      - name: dataset readiness
        run: ruff check vnalpha/src/vnalpha/data_availability/dataset_readiness.py && ruff format --check vnalpha/src/vnalpha/data_availability/dataset_readiness.py
      - name: trading calendar
        run: ruff check vnalpha/src/vnalpha/ingestion/trading_calendar.py && ruff format --check vnalpha/src/vnalpha/ingestion/trading_calendar.py
      - name: p0 tests
        run: ruff check vnalpha/tests/test_p0_operations_truthfulness.py && ruff format --check vnalpha/tests/test_p0_operations_truthfulness.py

name: vnalpha-debian-package

on:
  pull_request:
    paths:
      - "Makefile"
      - "packaging/**"
      - "vnalpha/pyproject.toml"
      - ".github/workflows/vnalpha-debian-package.yml"
  push:
    branches:
      - main
    paths:
      - "Makefile"
      - "packaging/**"
      - "vnalpha/pyproject.toml"
      - ".github/workflows/vnalpha-debian-package.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vnalpha-debian-package-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  package:
    name: Build and verify Debian package
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: vnalpha/pyproject.toml

      - name: Validate install source contract
        run: bash packaging/test/test_install_contract.sh

      - name: Validate package structure
        run: |
          PACKAGING_TEST_GROUP=files packaging/test/test_packaging.sh
          PACKAGING_TEST_GROUP=syntax packaging/test/test_packaging.sh
          PACKAGING_TEST_GROUP=metadata packaging/test/test_packaging.sh
          PACKAGING_TEST_GROUP=boundary packaging/test/test_packaging.sh
          PACKAGING_TEST_GROUP=state packaging/test/test_packaging.sh
          bash -n packaging/test/test_deb_install_upgrade.sh
          bash -n packaging/test/deb_install_upgrade_inner.sh

      - name: Install build prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends dpkg-dev python3-venv unzip
          python -m pip install --quiet --disable-pip-version-check --upgrade pip setuptools wheel

      - name: Build standalone Debian package
        run: |
          rm -rf packaging/dist-ci
          mkdir -p packaging/dist-ci
          packaging/build-deb.sh --output-dir packaging/dist-ci

      - name: Validate built package and offline runtime
        run: bash packaging/test/test_install_contract.sh packaging/dist-ci/vnalpha_*.deb

      - name: Validate install, upgrade and broken-wheel rollback
        run: bash packaging/test/test_deb_install_upgrade.sh packaging/dist-ci/vnalpha_*.deb

      - name: Upload package artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: vnalpha-debian-package
          path: packaging/dist-ci/vnalpha_*.deb
          if-no-files-found: error
          retention-days: 7

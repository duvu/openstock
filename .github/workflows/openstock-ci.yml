name: openstock-ci

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: openstock-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  NO_COLOR: "1"
  _TYPER_FORCE_DISABLE_TERMINAL: "1"

jobs:
  consistency:
    name: Repository consistency
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Repository contracts
        run: python scripts/check-repo-consistency.py

      - name: Repository hygiene
        run: make repo-hygiene

      - name: Secret scan
        run: packaging/scripts/openstock-secret-scan

      - name: Compose validation
        run: make validate-compose

  vnalpha:
    name: vnalpha lint and tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: vnalpha/pyproject.toml

      - name: Install vnalpha development dependencies
        run: |
          python -m pip install --quiet --disable-pip-version-check --upgrade pip
          python -m pip install --quiet --disable-pip-version-check -e "./vnalpha[dev]"

      - name: Ruff
        run: make lint-vnalpha

      - name: Complete vnalpha suite
        run: make test-vnalpha

      - name: Build vnalpha package artifacts
        run: python -m build --wheel --sdist --no-isolation --outdir /tmp/vnalpha-dist ./vnalpha

  vnstock:
    name: vnstock contracts and package
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: vnstock/pyproject.toml

      - name: Install vnstock development dependencies
        run: |
          python -m pip install --quiet --disable-pip-version-check --upgrade pip
          python -m pip install --quiet --disable-pip-version-check -e "./vnstock[dev]"

      - name: Ruff
        run: |
          cd vnstock
          ruff check .
          ruff format --check .

      - name: Provider and canonical contract tests
        run: |
          cd vnstock
          PYTHONPATH=. pytest -q \
            tests/unit/core/provider \
            tests/unit/providers/test_fiinquantx_foundation.py \
            tests/unit/providers/test_fiinquantx_runtime_hardening.py \
            tests/contracts/providers \
            tests/contracts/test_corporate_action_contract.py \
            tests/contracts/test_builtin_provider_capabilities.py

      - name: Build vnstock package artifacts
        run: python -m build --wheel --sdist --no-isolation --outdir /tmp/vnstock-dist ./vnstock

  required:
    name: Required merge gate
    if: always()
    needs:
      - consistency
      - vnalpha
      - vnstock
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Require all validation jobs
        env:
          CONSISTENCY_RESULT: ${{ needs.consistency.result }}
          VNALPHA_RESULT: ${{ needs.vnalpha.result }}
          VNSTOCK_RESULT: ${{ needs.vnstock.result }}
        run: |
          printf 'Repository consistency: %s\n' "$CONSISTENCY_RESULT"
          printf 'vnalpha lint and tests: %s\n' "$VNALPHA_RESULT"
          printf 'vnstock contracts and package: %s\n' "$VNSTOCK_RESULT"
          test "$CONSISTENCY_RESULT" = success
          test "$VNALPHA_RESULT" = success
          test "$VNSTOCK_RESULT" = success

name: export-pr-source

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout branch head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          submodules: false

      - name: Record source tree identity
        run: |
          git rev-parse HEAD > source-head.txt
          git rev-parse 'HEAD^{tree}' > source-tree.txt
          cat source-head.txt
          cat source-tree.txt

      - name: Archive source tree
        run: git archive --format=tar.gz --output=openstock-source.tar.gz HEAD

      - name: Upload source tree
        uses: actions/upload-artifact@v4
        with:
          name: openstock-pr-${{ github.event.pull_request.number || github.run_id }}-source
          path: |
            openstock-source.tar.gz
            source-head.txt
            source-tree.txt
          if-no-files-found: error
          retention-days: 1

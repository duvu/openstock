name: issue-closure-contract

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  validate:
    name: Validate issue closure evidence
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate closing issue contracts
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python scripts/check_issue_closure_contract.py

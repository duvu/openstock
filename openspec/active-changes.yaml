# Registry for non-archived OpenSpec lifecycle and evidence.
reviewed_at: 2026-07-19
policy:
  active_directory: openspec/changes
  archive_directory: openspec/changes/archive
  roadmap_source: https://github.com/duvu/openstock/issues/238
  priorities_owned_by: github_issues
  dependencies_owned_by: github_issues
  require_github_issue_for_scheduled_work: true
  research_only_boundary: true

changes:

  queue-backed-cache-first-current-symbol-provisioning:
    status: partial
    github_issues: [317, 320, 323, 324, 338, 343]
    roadmap_state: scheduled
    summary: >-
      Replace direct current-symbol provisioning with a bounded cache-first
      queue, preserving single-writer warehouse ownership and truthful
      readiness across interactive and maintenance callers.
    evidence: >-
      Warehouse ownership (#343), readiness contracts (#320) and typed
      provisioning goals (#338), durable queue repository (#323) and sequential
      worker core (#324) are implemented; bounded stage interruption and
      shutdown proof remain incomplete. Commits
      85caa5da2481822c84cbac45594feb94abad9176 and
      079c32dfa3d59fd9bb345d5b730a0112035c2d45 and
      031aef766584d14493b3835dc65baf69705098e3 add durable lifecycle,
      active-stage lease safety and canonical provisioner locking; queue-backed application behavior remains
      incomplete.

  consolidate-authoritative-test-suite:
    status: partial
    github_issues: [348]
    roadmap_state: scheduled
    summary: >-
      Enforce a 60-second development loop and consolidate the repository to a
      checked 180–220 authoritative contract inventory (hard cap 250), with
      duplicate execution, test and checker removal plus isolated DuckDB reuse.
    evidence: >-
      Issue #348 owns the normative policy, spec-first gate, phased execution
      plan and before/after acceptance evidence. Initial routing, aggregate
      de-duplication and fixture work are implemented; inventory consolidation
      and final evidence remain incomplete.

  validate-daily-equity-ranking:
    status: partial
    github_issues: [196, 197, 198, 199, 200, 201, 202, 203, 204, 205, 206]
    roadmap_state: scheduled
    summary: >-
      Validate the daily full-universe equity-ranking vertical through shared
      point-in-time eligibility, explicit price basis, immutable scoring and
      ranking policies, held-out evaluation, versioned assumptions, reproducible
      reports, append-only observations, bounded dataset experiments and reviewed
      manual policy decisions.
    evidence: >-
      GitHub epic #196 owns the dependency graph. Issue #197 is the first
      implementation slice and aligns production feature status with research
      eligibility while moving hypothesis measurement to complete later outcomes.

  mvp1-golden-acceptance:
    status: ready
    github_issues: [167]
    roadmap_state: review_required
    summary: >-
      One automated golden conversation proving the MVP1 chat vertical slice end
      to end on the real code path from an empty warehouse: provisioning, real
      canonical/feature/scoring builders, deep analysis, synthesis, groundedness,
      audit and symbol-knowledge projection; plus fresh reuse, explicit refresh,
      fail-closed service failure and slash/NL contract parity.
    evidence: >-
      PR #172 merged issue #167 with required CI. The golden test covers real
      builders, fresh reuse, explicit refresh and fail-closed provisioning.
      Exact-candidate installed-host acceptance remains owned by #181/#162.

  mvp1-startup-preflight:
    status: ready
    github_issues: [166]
    roadmap_state: review_required
    summary: >-
      Add one idempotent `openstock-mvp1-start` command and a read-only
      `openstock-verify --mvp1` installed-host preflight for the MVP1 chat
      vertical slice: persistent paths, service health, warehouse migration and
      disk, knowledge path, LLM route (#165), backup/restore availability (#150)
      and release metadata, with PASS/WARN/FAIL and non-zero exit on blockers.
    evidence: >-
      PR #171 merged issue #166 with required CI. Current hardening adds secure
      command logs, exact release metadata, configured Compose project
      resolution and fail-closed warehouse/FQ readiness. Exact-candidate
      installed-host acceptance remains owned by #181/#162.

  assistant-llm-preflight:
    status: ready
    github_issues: [165]
    roadmap_state: review_required
    summary: >-
      Add a bounded, typed, redaction-safe assistant LLM startup preflight that
      verifies one MVP1 model route (config, credentials, routing, reachability,
      auth, model visibility, structured-output capability and route identity),
      a `vnalpha preflight` CLI, degraded-mode messaging in `ask`, and an
      upgraded openstock-verify assistant check.
    evidence: >-
      PR #170 merged issue #165 with required CI. Current hardening requires
      HTTPS outside loopback, strict non-downgraded schema output and
      metadata-only error logs. Real deployed-route evidence remains owned by
      #180/#162.

  symbol-knowledge-projection:
    status: ready
    github_issues: [164]
    roadmap_state: review_required
    summary: >-
      After a successful chat deep-analysis, project the turn's validated
      deterministic evidence (candidate score, feature-quality snapshot,
      market-regime context) into the per-symbol knowledge base idempotently
      with provenance and lifecycle controls, reusing the existing symbol-memory
      ingestion/lifecycle/compaction and source-grounding guards. Never promote
      raw chat text or LLM prose.
    evidence: >-
      PR #169 merged issue #164 with required CI. Current hardening makes
      multi-claim projection atomic and adds fail-closed point-in-time identity
      plus canonical raw-basis evidence. Final integrated acceptance remains
      owned by #162.

  corporate-action-ingestion:
    status: ready
    github_issues: [112]
    roadmap_state: review_required
    summary: >-
      Add provider-independent corporate-action evidence, raw-first canonical
      reconciliation, immutable revisions, quarantine and affected-range signals
      without calculating adjusted prices.
    evidence: >-
      Implementation source SHA 3b6d990d93248fcf11e0650a8e3c8417411056dd and
      validated head 83d2c77162b6d6b136cb8885d148bd3bd8c3f4ed passed repository
      consistency, documentation contracts, Ruff, focused issue #112 regressions,
      R0, the complete vnalpha suite, vnstock provider/canonical contracts, both
      package builds and Required merge gate in openstock-ci run #71. PR #154 is
      ready for final metadata validation and review; archive after merge.

  required-ci-merge-gates:
    status: partial
    github_issues: [147]
    roadmap_state: review_required
    summary: >-
      Keep all openstock-ci checks present on every pull request, aggregate their
      results into an always-evaluated merge gate and align executable repository
      checks with branch-protection documentation.
    evidence: >-
      Implementation SHA 1adcae5db3ab1b0fcb22139874b27508228418fc passed
      repository consistency, checker tests, Ruff, focused regressions, R0, the
      complete vnalpha suite, vnstock contracts, both package builds and the
      Required merge gate in openstock-ci run #47. Administrator verification of
      the live GitHub main ruleset remains pending in issue #147.

  llm-capability-aware-strict-fallback:
    status: ready
    github_issues: [144]
    roadmap_state: review_required
    summary: >-
      Use explicit per-profile capabilities to select only verified strict JSON
      Schema fallbacks, expose truthful routing status and preserve typed failure
      evidence.
    evidence: >-
      Implementation SHA 1a82ed837782b32950e50da80dad2ca599934959 passed
      repository consistency, Ruff, focused #144 regressions, R0, the complete
      vnalpha suite, vnstock provider/canonical contracts and both package builds
      in openstock-ci run #42. PR #152 is ready for final metadata validation and
      review; archive after merge and lifecycle reconciliation under #148.

  production-market-context-v2:
    status: ready
    github_issues: [84]
    roadmap_state: review_required
    summary: >-
      Preserve explicit v1 compatibility while making production market-regime
      and sector-strength v2 policies the default for coverage, robust
      aggregation and deep-analysis readiness.
    evidence: >-
      Implementation SHA 661f35ce1aebe7bc8e56b6f7490686cd2cfaa9a2 passed
      repository consistency, Ruff, focused regressions, R0, the complete
      vnalpha suite, 347 vnstock provider/canonical tests and both package builds
      in openstock-ci run #35. PR #145 is ready for final metadata validation and
      review; archive after merge and roadmap reconciliation.
  fiinquantx-provider-integration:
    status: partial
    github_issues: [193]
    roadmap_state: scheduled
    summary: >-
      Integrate only licensed, verified synchronous FiinQuantX market and
      reference capabilities through the vnstock plugin runtime; defer
      streaming and exclude all trading/account SDK surfaces.
    evidence: >-
      PR #122 merged an experimental explicit-source-only runtime for bounded
      daily equity/index OHLCV and current index/sector membership snapshots,
      with lazy SDK loading, exact-version checks, local credentials, canonical
      output guards and bounded licensed smoke tests. Issue #136 hardens the
      runtime and persistence gates so boolean acknowledgements also require
      auditable non-secret approval references; it does not establish commercial
      permission. GitHub issue 193 now owns the remaining closure work. Offline
      implementation and tests cover explicit raw/unadjusted OHLCV requests,
      basis-aware raw/canonical persistence and research disclosure, safe
      provider lineage, atomic membership persistence, CLI integration,
      installed-host readiness checks and fail-closed approval semantics.
      Current licensed equity/index/member probes, commercial-permission
      approval and a fresh-host smoke remain pending and must not be inferred
      from historical evidence. The provider track is optional and does not
      block the default-provider roadmap.

  tui-terminal-rendering-integrity:
    status: partial
    github_issues: [189, 190, 191, 192]
    roadmap_state: review_required
    summary: >-
      Surface-aware file-backed TUI logging and bounded non-overlapping
      Textual regions.
    evidence: >-
      PR #67 merged the original issue #60 baseline. Reopened issues #189-#192
      supersede its TODO-rail and separate-LogScreen assumptions with one
      full-width transcript, an inline F12 log drawer, semantic results,
      truthful clipboard transport and compact keyboard navigation. Archival is
      deferred until #162 closure.

  prod-d-closed-loop-repair:
    status: partial
    github_issues: []
    roadmap_state: proposed_untracked
    summary: >-
      Bounded repair, validation, promotion, rejection and rollback for
      sandbox/research artifacts only.
    evidence: >-
      Runtime slices and focused tests exist, but no open GitHub issue owns the
      residual repository-wide validation and closure work. This change is not
      scheduled until such an issue is created.

  deep-symbol-analysis-engine:
    status: partial
    github_issues: [75, 76, 77, 92, 95, 99, 227]
    roadmap_state: review_required
    summary: >-
      Warehouse-grounded deep symbol analysis with deterministic readiness for
      symbol, market-regime and sector-strength inputs plus explicit data
      commands.
    evidence: >-
      Linked readiness and provisioning issues are closed and their runtime
      paths are implemented. Reconcile remaining broad OpenSpec tasks against
      merged evidence and archive the accepted scope; any real residual work
      requires a new focused issue before scheduling.

  research-scenario-plan-engine:
    status: partial
    github_issues: []
    roadmap_state: proposed_untracked
    summary: >-
      Conditional, caveated research scenario plans without trading
      instructions.
    evidence: >-
      Scenario generation tool, intent and template exist; remaining command,
      persistence and validator work has no open GitHub issue and is not
      scheduled.

  setup-historical-evidence-engine:
    status: partial
    github_issues: [85]
    roadmap_state: scheduled
    summary: >-
      Setup-cohort historical evidence with sample-size, regime and sector
      caveats.
    evidence: >-
      Existing setup-history slices are partial. Issue #85 owns richer
      distributions, adverse/favorable excursion evidence, conditioning,
      persistence and closure validation.

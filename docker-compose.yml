# Canonical OpenStock single-host deployment.
#
# Required host directories (override with environment variables when needed):
#   OPENSTOCK_WAREHOUSE_DIR=/var/lib/openstock/warehouse
#   VNSTOCK_CONFIG_DIR=/var/lib/openstock/vnstock-config
#
# Prepare production defaults:
#   sudo install -d -m 0755 /var/lib/openstock/warehouse
#   sudo install -d -m 0755 /var/lib/openstock/vnstock-config
#
# Start the data service:
#   docker compose up -d vnstock-service
#
# Run one-shot pipeline jobs:
#   docker compose --profile job run --rm vnalpha-worker init
#   docker compose --profile job run --rm vnalpha-worker sync symbols
#   docker compose --profile job run --rm vnalpha-worker build canonical
#
# Configure credentialed providers separately:
#   docker compose --profile login run --rm vnstock-login status

services:
  vnstock-service:
    build:
      context: ./vnstock
      dockerfile: Dockerfile
      args:
        INSTALL_FIINQUANTX: ${VNSTOCK_INSTALL_FIINQUANTX:-false}
    image: vnstock-service:latest
    container_name: vnstock-service
    ports:
      - "127.0.0.1:6900:6900"
    volumes:
      - "${VNSTOCK_CONFIG_DIR:-/var/lib/openstock/vnstock-config}:/home/vnstock/.config/vnstock:ro"
    environment:
      PYTHONUNBUFFERED: "1"
      FIINQUANT_USERNAME: ${FIINQUANT_USERNAME:-}
      FIINQUANT_PASSWORD: ${FIINQUANT_PASSWORD:-}
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:6900/healthz')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  vnstock-login:
    build:
      context: ./vnstock
      dockerfile: Dockerfile
      args:
        INSTALL_FIINQUANTX: ${VNSTOCK_INSTALL_FIINQUANTX:-false}
    image: vnstock-service:latest
    profiles:
      - login
    volumes:
      - "${VNSTOCK_CONFIG_DIR:-/var/lib/openstock/vnstock-config}:/home/vnstock/.config/vnstock"
    environment:
      FIINQUANT_USERNAME: ${FIINQUANT_USERNAME:-}
      FIINQUANT_PASSWORD: ${FIINQUANT_PASSWORD:-}
    entrypoint: ["vnstock-auth"]
    command: ["status"]

  vnalpha-worker:
    build:
      context: ./vnalpha
      dockerfile: Dockerfile
    image: vnalpha-worker:latest
    profiles:
      - job
    volumes:
      - warehouse:/warehouse
    environment:
      PYTHONUNBUFFERED: "1"
      VNSTOCK_SERVICE_URL: http://vnstock-service:6900
      VNALPHA_WAREHOUSE_PATH: /warehouse/warehouse.duckdb
      VNALPHA_LOG_LEVEL: ${VNALPHA_LOG_LEVEL:-INFO}
      VNALPHA_LLM_ENDPOINT: ${VNALPHA_LLM_ENDPOINT:-}
      VNALPHA_LLM_MODEL: ${VNALPHA_LLM_MODEL:-}
      VNALPHA_LLM_API_KEY: ${VNALPHA_LLM_API_KEY:-}
      VNALPHA_LLM_STORE_RAW: ${VNALPHA_LLM_STORE_RAW:-false}
      VNALPHA_MODEL_SMALL: ${VNALPHA_MODEL_SMALL:-}
      VNALPHA_MODEL_DEFAULT: ${VNALPHA_MODEL_DEFAULT:-}
      VNALPHA_MODEL_REASONING: ${VNALPHA_MODEL_REASONING:-}
      VNALPHA_MODEL_LONG_CONTEXT: ${VNALPHA_MODEL_LONG_CONTEXT:-}
    depends_on:
      vnstock-service:
        condition: service_healthy

volumes:
  warehouse:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${OPENSTOCK_WAREHOUSE_DIR:-/var/lib/openstock/warehouse}

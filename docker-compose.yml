# openstock docker-compose.yml
# Orchestrates vnstock-service for local research workflow,
# and vnalpha-worker for on-demand data pipeline jobs.
#
# Usage:
#   docker compose up -d                   # start data platform
#   docker compose down                    # stop
#   docker compose logs -f                 # follow logs
#
# Run a pipeline job (profile-gated, does not start automatically):
#   docker compose run --rm vnalpha-worker init
#   docker compose run --rm vnalpha-worker sync symbols
#   docker compose run --rm vnalpha-worker sync ohlcv --universe VN30
#   docker compose run --rm vnalpha-worker build canonical
#   docker compose run --rm vnalpha-worker build features
#   docker compose run --rm vnalpha-worker score
#   docker compose run --rm vnalpha-worker watchlist
#
# Warehouse volume (created by Docker if absent):
#   /var/lib/openstock/warehouse  →  /warehouse  inside the worker

services:
  vnstock-service:
    build:
      context: ./vnstock
      dockerfile: Dockerfile
    image: vnstock-service:latest
    container_name: vnstock-service
    ports:
      - "127.0.0.1:6900:6900"
    volumes:
      - "${HOME}/.config/vnstock:/home/vnstock/.config/vnstock:ro"
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:6900/healthz')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  vnalpha-worker:
    build:
      context: ./vnalpha
      dockerfile: Dockerfile
    image: vnalpha-worker:latest
    container_name: vnalpha-worker
    profiles:
      - job
    volumes:
      - warehouse:/warehouse
    environment:
      - PYTHONUNBUFFERED=1
      - VNSTOCK_SERVICE_URL=http://vnstock-service:6900
      - VNALPHA_WAREHOUSE_PATH=/warehouse/warehouse.duckdb
    depends_on:
      vnstock-service:
        condition: service_healthy

volumes:
  warehouse:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /var/lib/openstock/warehouse

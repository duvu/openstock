# openstock docker-compose.yml
# Runs vnstock-service (Docker) + vnalpha CLI on host.
#
# Start:  docker compose up -d
# Stop:   docker compose down
#
# vnalpha pipeline (run on host, connects to vnstock-service at :6900):
#   vnalpha init
#   vnalpha sync symbols
#   vnalpha sync ohlcv --universe VN30
#   vnalpha build canonical
#   vnalpha build features
#   vnalpha score
#   vnalpha watchlist
#   vnalpha tui
#
# Warehouse: ~/.local/share/openstock/warehouse/warehouse.duckdb (host)

services:
  vnstock-service:
    build:
      context: ./vnstock
      dockerfile: Dockerfile
    image: vnstock-service:latest
    container_name: vnstock-service
    ports:
      - "127.0.0.1:6900:6900"
    volumes:
      - "${HOME}/.config/vnstock:/home/vnstock/.config/vnstock:ro"
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:6900/healthz')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  vnalpha-worker:
    build:
      context: ./vnalpha
      dockerfile: Dockerfile
    image: vnalpha-worker:latest
    container_name: vnalpha-worker
    profiles:
      - job
    volumes:
      - warehouse:/warehouse
    environment:
      - PYTHONUNBUFFERED=1
      - VNSTOCK_SERVICE_URL=http://vnstock-service:6900
      - VNALPHA_WAREHOUSE_PATH=/warehouse/warehouse.duckdb
    depends_on:
      vnstock-service:
        condition: service_healthy

volumes:
  warehouse:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/beou/.local/share/openstock/warehouse
